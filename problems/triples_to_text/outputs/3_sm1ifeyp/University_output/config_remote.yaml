# Configuration for function minimization example
max_iterations: 1000
checkpoint_interval: 100
diff_based_evolution: true
max_code_length: 20000
log_level: "INFO"
random_seed: null
island_unique_models: true

# LLM configuration
llm:
  models:
    - name: "google/gemma-4-31B-it"
      island: 0
      weight: 1.0
      api_base: "http://localhost:3011/v1"
      api_key: "AiIsMyLife25"

  max_tokens: 3000
  timeout: 120
  manual_mode: false

# Prompt configuration
prompt:
  template_dir: "./templates/"
  num_top_programs: 0
  num_diverse_programs: 0
  num_inspirations: 1
  include_artifacts: true
  suggest_simplification_after_chars: 10000

# Database configuration
database:
  population_size: 50
  archive_size: 10
  num_islands: 1
  exploration_ratio: 0.0
  exploitation_ratio: 1.0
  migration_interval: 50
  migration_rate: 0.2
  roulette_selection: true
  db_path: "./outputs/3_sm1ifeyp/University_output/all_programs/"
  
# Evaluator configuration
evaluator:
  cascade_evaluation: false
  parallel_evaluations: 1
  themis_enabled: true
  themis_name: "google/gemma-4-31B-it"
  themis_api_base: "http://localhost:3010/v1"
  themis_api_key: "AiIsMyLife25"

evolution_trace:
  enabled: true
  format: 'json'
  include_code: true
  include_prompts: true
  buffer_size: 10